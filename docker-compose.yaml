version: '3.9'

services:
  app:
    build: .
    container_name: simkm-app
    restart: unless-stopped
    ports:
      - '8000:80'
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mental_health
      DB_USERNAME: appuser
      DB_PASSWORD: p@ssw0rd
    env_file:
      - .env
    volumes:
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mental_health
      MYSQL_USER: appuser
      MYSQL_PASSWORD: p@ssw0rd
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
