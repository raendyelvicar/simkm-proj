version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mental_health
      MYSQL_USER: appuser
      MYSQL_PASSWORD: p@ssw0rd
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
